<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - AK SUPER CLASSES</title>
    <link rel="stylesheet" href="styles.css">
    <script src="pwa.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" style="display:flex;align-items:center;gap:10px;">
                    <div class="logo-circle">AK</div>
                    <span class="brand-name">AK SUPER CLASSES</span>
                </a>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="academics.html" class="nav-link">Academics</a>
                <a href="contact.html" class="nav-link nav-link-pill">Contact Us</a>
            </nav>
            <a href="login.html" class="login-btn">Login</a>
        </div>
    </header>

    <!-- Registration -->
    <section class="auth-section">
        <div class="auth-card">
            <h1 class="auth-title">Create Your Account</h1>
            <p class="auth-subtitle">Join AK SUPER CLASSES and unlock interactive learning tailored for your child.</p>

            <form id="registerForm" class="auth-form" novalidate>
                <div class="form-field">
                    <label for="regName">Full Name<span class="req">*</span></label>
                    <input type="text" id="regName" name="name" placeholder="Student's full name" required>
                </div>

                <div class="form-field">
                    <label for="regEmail">Email Address<span class="req">*</span></label>
                    <input type="email" id="regEmail" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-field">
                    <label for="regMobile">Mobile Number<span class="req">*</span></label>
                    <input type="tel" id="regMobile" name="mobile" placeholder="+91 98765 43210" required pattern="[0-9+\-\s]{7,20}">
                </div>

                <div class="form-row">
                    <div class="form-field">
                        <label for="regClass">Class<span class="req">*</span></label>
                        <select id="regClass" name="class" required>
                            <option value="" disabled selected>Select class</option>
                            <option value="1">Class 1st</option>
                            <option value="2">Class 2nd</option>
                            <option value="3">Class 3rd</option>
                            <option value="4">Class 4th</option>
                            <option value="5">Class 5th</option>
                            <option value="6">Class 6th</option>
                            <option value="7">Class 7th</option>
                            <option value="8">Class 8th</option>
                            <option value="9">Class 9th</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label for="regSubject">Subject<span class="req">*</span></label>
                        <select id="regSubject" name="subject" required>
                            <option value="" disabled selected>Select subject</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physics">Physics</option>
                            <option value="Chemistry">Chemistry</option>
                            <option value="Biology">Biology</option>
                        </select>
                    </div>
                </div>

                <div class="form-field">
                    <label for="regPassword">Password<span class="req">*</span></label>
                    <input type="password" id="regPassword" name="password" placeholder="At least 6 characters" required minlength="6">
                </div>

                <div class="form-field">
                    <label for="regPasswordConfirm">Confirm Password<span class="req">*</span></label>
                    <input type="password" id="regPasswordConfirm" name="passwordConfirm" placeholder="Re-enter password" required minlength="6">
                </div>

                <button type="submit" class="auth-submit" id="registerSubmit">Create Account</button>

                <div class="auth-message" id="registerMessage" hidden></div>
            </form>

            <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </section>

    <script type="module" src="register.js"></script>
</body>
</html>
