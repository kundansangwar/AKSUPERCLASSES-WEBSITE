<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - AK SUPER CLASSES</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" style="display:flex;align-items:center;gap:10px;">
                    <div class="logo-circle">AK</div>
                    <span class="brand-name">AK SUPER CLASSES</span>
                </a>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="academics.html" class="nav-link">Academics</a>
                <a href="contact.html" class="nav-link nav-link-pill">Contact Us</a>
            </nav>
            <a href="register.html" class="login-btn">Register</a>
        </div>
    </header>

    <!-- Login -->
    <section class="auth-section">
        <div class="auth-card">
            <h1 class="auth-title" id="loginTitle">Welcome Back</h1>
            <p class="auth-subtitle" id="loginSubtitle">Log in to continue your learning journey.</p>

            <div class="auth-tabs" role="tablist" aria-label="Login mode">
                <button type="button" class="auth-tab active" data-mode="student" role="tab" aria-selected="true">Student</button>
                <button type="button" class="auth-tab" data-mode="admin" role="tab" aria-selected="false">Admin</button>
            </div>

            <form id="loginForm" class="auth-form" novalidate>
                <div class="form-field">
                    <label for="loginEmail">Email Address<span class="req">*</span></label>
                    <input type="email" id="loginEmail" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-field">
                    <label for="loginPassword">Password<span class="req">*</span></label>
                    <input type="password" id="loginPassword" name="password" placeholder="Your password" required>
                </div>

                <div class="auth-row-between">
                    <span></span>
                    <button type="button" class="auth-link-btn" id="forgotPasswordBtn">Forgot password?</button>
                </div>

                <button type="submit" class="auth-submit" id="loginSubmit">Log In</button>

                <div class="auth-message" id="loginMessage" hidden></div>
            </form>

            <p class="auth-switch">Don&rsquo;t have an account? <a href="register.html">Create one</a></p>
        </div>
    </section>

    <!-- Forgot password modal -->
    <div class="auth-modal" id="forgotModal" hidden>
        <div class="auth-modal-content">
            <h2 class="auth-modal-title">Reset Password</h2>
            <p class="auth-modal-text">Enter your email and we&rsquo;ll send you a reset link.</p>
            <div class="form-field">
                <label for="resetEmail">Email Address</label>
                <input type="email" id="resetEmail" placeholder="you@example.com">
            </div>
            <div class="auth-modal-actions">
                <button type="button" class="auth-link-btn" id="forgotCancel">Cancel</button>
                <button type="button" class="auth-submit auth-submit-compact" id="forgotSend">Send Reset Link</button>
            </div>
            <div class="auth-message" id="forgotMessage" hidden></div>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
